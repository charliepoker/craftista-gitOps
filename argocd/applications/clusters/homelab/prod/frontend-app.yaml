apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: craftista-frontend-prod
  namespace: argocd
  labels:
    app: frontend
    environment: production
    component: web
spec:
  project: craftista-homelab
  source:
    repoURL: https://github.com/charliepoker/craftista-gitops.git
    targetRevision: main
    path: kubernetes/overlays/homelab/prod/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: craftista-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/replicas
