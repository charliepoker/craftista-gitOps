apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: craftista-prod-bootstrap
  namespace: argocd
  labels:
    environment: production
spec:
  project: craftista-homelab
  source:
    repoURL: https://github.com/charliepoker/craftista-gitops.git
    targetRevision: main
    path: argocd/applications/clusters/homelab/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
